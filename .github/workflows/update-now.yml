name: Update /now page (Gemini)

on:
  # 毎週月曜 09:00 JST (= Sunday 00:00 UTC)
  schedule:
    - cron: '0 0 * * 1'
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write  # now.json のコミット & プッシュに必要

jobs:
  update-now:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # push するために PAT or default token (write権限付き) を使う
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate /now content with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PORTFOLIO_TOKEN_TYUKEI }}
        run: bun scripts/update-now.mjs

      - name: Commit and push now.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/static-api/now.json
          # 変更がなければコミットしない
          if git diff --staged --quiet; then
            echo "No changes to now.json, skipping commit."
          else
            git commit -m "chore: update /now page via Gemini [$(date -u +%Y-%m-%d)]"
            git push
            echo "Pushed updated now.json — deploy workflow will be triggered automatically."
          fi
