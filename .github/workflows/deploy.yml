name: Deploy to Lolipop

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Prepare API directory
        run: |
          # distの中にapiディレクトリをまるごとコピーする
          cp -r api dist/

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # アップロードするローカルのディレクトリ（Qwikのビルド結果とAPIが含まれたフォルダ）
          local-dir: ./dist/
          # ロリポップ側のアップロード先ディレクトリ
          # （例: ドメインの公開フォルダが /web/ なら /web/ に修正してください）
          server-dir: /web/
