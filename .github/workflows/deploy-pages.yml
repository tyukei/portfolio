name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        env:
          BASE_PATH: ${{ vars.BASE_PATH != '' && vars.BASE_PATH || '/' }}
          SITE_ORIGIN: ${{ vars.SITE_ORIGIN != '' && vars.SITE_ORIGIN || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          GITHUB_TOKEN: ${{ secrets.PORTFOLIO_GITHUB_TOKEN }}
          PORTFOLIO_TOKEN_TYUKEI: ${{ secrets.PORTFOLIO_TOKEN_TYUKEI }}
          PORTFOLIO_TOKEN_CHUKEI2: ${{ secrets.PORTFOLIO_TOKEN_CHUKEI2 }}
          CONNPASS_API_KEY: ${{ secrets.CONNPASS_API_KEY }}
        run: |
          echo "BASE_PATH=$BASE_PATH"
          echo "SITE_ORIGIN=$SITE_ORIGIN"
          bun run build

      - name: Debug built base
        run: |
          if [ -f "dist/index.html" ]; then
            echo "Built at dist/"
            grep -o 'q:base="[^"]*"' dist/index.html || true
            grep -o 'href="/[^"]*"' dist/index.html | head -n 10 || true
          elif [ -f "dist/portfolio/index.html" ]; then
            echo "Built at dist/portfolio/"
            grep -o 'q:base="[^"]*"' dist/portfolio/index.html || true
            grep -o 'href="/[^"]*"' dist/portfolio/index.html | head -n 10 || true
          fi

      - name: Detect artifact path
        id: artifact-path
        run: |
          if [ -d "dist/portfolio" ]; then
            echo "path=dist/portfolio" >> "$GITHUB_OUTPUT"
          else
            echo "path=dist" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.artifact-path.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
